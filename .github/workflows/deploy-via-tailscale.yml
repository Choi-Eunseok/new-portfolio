name: Deploy via Tailscale

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Join tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.DEPLOY_HOST }}
          statedir: /tmp/tailscale-state/

      - name: Deploy to Ubuntu server over Tailscale SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            # 필수: 서버 내 프로젝트 경로
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            BRANCH="main"
            # 선택: 명시적인 재시작 명령 (예: pm2 reload all, sudo systemctl restart myapp)
            RESTART_CMD="${{ secrets.DEPLOY_RESTART_CMD }}"
            FRONTEND_PORT="${{ secrets.FRONTEND_PORT }}"
            BACKEND_PORT="${{ secrets.BACKEND_PORT }}"

            FRONTEND_PORT="${FRONTEND_PORT:-3000}"
            BACKEND_PORT="${BACKEND_PORT:-8000}"

            export FRONTEND_PORT BACKEND_PORT

            if [ -z "$APP_DIR" ]; then
              echo "DEPLOY_APP_DIR secret is required."
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            if ! command -v pnpm >/dev/null 2>&1 && command -v corepack >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
            fi

            command -v pnpm >/dev/null 2>&1 || {
              echo "pnpm is required on the deploy server."
              exit 1
            }

            pnpm install --frozen-lockfile
            pnpm build

            # 실행/재시작 단계 (중요: build만으로는 서비스 반영이 안 됨)
            if [ -n "$RESTART_CMD" ]; then
              echo "Restarting with DEPLOY_RESTART_CMD."
              bash -lc "$RESTART_CMD"
            elif command -v pm2 >/dev/null 2>&1 && [ -f ecosystem.config.cjs ]; then
              command -v uv >/dev/null 2>&1 || {
                echo "uv is required on the deploy server for the backend process."
                exit 1
              }
              echo "Restarting PM2 apps on frontend:${FRONTEND_PORT}, backend:${BACKEND_PORT}."
              pm2 startOrReload ecosystem.config.cjs --update-env
              pm2 save
            else
              echo "No restart command found."
              echo "Set DEPLOY_RESTART_CMD secret (e.g. 'pm2 startOrReload ecosystem.config.cjs --update-env')."
              echo "Or install pm2 on the deploy server so ecosystem.config.cjs can be used."
              exit 1
            fi
