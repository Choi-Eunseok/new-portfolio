name: Deploy via Tailscale

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Join tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.DEPLOY_HOST }}
          statedir: /tmp/tailscale-state/

      - name: Set up SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Deploy to Ubuntu server over Tailscale SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_RESTART_CMD: ${{ secrets.DEPLOY_RESTART_CMD }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
        run: |
          set -euo pipefail

          remote_env=$(
            printf 'APP_DIR=%q RESTART_CMD=%q FRONTEND_PORT=%q BACKEND_PORT=%q' \
              "$DEPLOY_APP_DIR" \
              "$DEPLOY_RESTART_CMD" \
              "${FRONTEND_PORT:-3000}" \
              "${BACKEND_PORT:-8000}"
          )

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$remote_env bash -se" <<'REMOTE_SCRIPT'
          set -euo pipefail

          BRANCH="main"
          export PATH="$HOME/.local/bin:$PATH"

          if [ -z "$APP_DIR" ]; then
            echo "DEPLOY_APP_DIR secret is required."
            exit 1
          fi

          cd "$APP_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          if ! command -v pnpm >/dev/null 2>&1 && command -v corepack >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@9.0.0 --activate
          fi

          command -v pnpm >/dev/null 2>&1 || {
            echo "pnpm is required on the deploy server."
            exit 1
          }

          pnpm install --frozen-lockfile
          pnpm build

          if [ -n "$RESTART_CMD" ]; then
            echo "Restarting with DEPLOY_RESTART_CMD."
            bash -lc "$RESTART_CMD"
          elif command -v pm2 >/dev/null 2>&1 && [ -f ecosystem.config.cjs ]; then
            command -v uv >/dev/null 2>&1 || {
              echo "uv is required on the deploy server for the backend process."
              exit 1
            }
            echo "Restarting PM2 apps on frontend:${FRONTEND_PORT}, backend:${BACKEND_PORT}."
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
          else
            echo "No restart command found."
            echo "Set DEPLOY_RESTART_CMD secret (e.g. 'pm2 startOrReload ecosystem.config.cjs --update-env')."
            echo "Or install pm2 on the deploy server so ecosystem.config.cjs can be used."
            exit 1
          fi
          REMOTE_SCRIPT
